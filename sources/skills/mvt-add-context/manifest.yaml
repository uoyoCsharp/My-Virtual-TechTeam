name: mvt-add-context
output: .claude/skills/mvt-add-context/SKILL.md

frontmatter:
  name: mvt-add-context
  description: "Interactively add or update project context information in the MVTT workspace. This skill should be used when user wants to manually add project details, requirements, architecture info, coding standards, or team conventions."

sections:
  - type: inline
    content: |
      # MVT Context Add

      ## Purpose

      Add or update project context information in the MVTT workspace through interactive guidance. Complementary to `/mvt-sync-context` (code-driven and automatic), this is a user-driven process for manual context entry.

  - type: shared
    source: sections/role-header.md
    params:
      role: Conductor
      role_desc: "a Workflow Coordinator"
      decision_rules:
        - rule: "Project not initialized -> Suggest `/mvt-init` first, but allow manual context entry"
        - rule: "Missing project basics -> Guide through project info collection"
        - rule: "Missing requirements -> Guide through requirements entry"
        - rule: "Missing architecture -> Guide through architecture info"
        - rule: "User provides coding standards -> Write to knowledge/principle/"
        - rule: "User provides project knowledge -> Write to knowledge/project/"
      boundaries:
        - scope: "analyze code automatically"
          skill: "/mvt-sync-context or /mvt-analyze-code"
        - scope: "make architecture decisions"
          skill: "/mvt-design"
        - scope: "write implementation code"
          skill: "/mvt-implement"

  - type: shared
    source: sections/activation-load-context.md

  - type: shared
    source: sections/activation-load-config.md

  - type: inline
    content: |
      ### Step 3: Pre-flight Checks
