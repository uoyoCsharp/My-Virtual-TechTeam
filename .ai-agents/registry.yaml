    category: project
    mode: independent

  mvt-sync-context:
    agent: conductor
    path: .claude/skills/mvt-sync-context/SKILL.md
    template: skills/_templates/sync-context-output.md
    category: project
    mode: independent

  mvt-update:
    agent: conductor
    path: .claude/skills/mvt-update/SKILL.md
    template: skills/_templates/update-framework-output.md
    category: project
    mode: independent

  mvt-cleanup:
    agent: conductor
    path: .claude/skills/mvt-cleanup/SKILL.md
    template: skills/_templates/cleanup-output.md
    category: project
    mode: independent

  # --- Analyst Skills ---
