# AI Agent Framework Registry
# Single source of truth for framework configuration

version: "2.0"
last_updated: "2026-04-25"

# ============================================================
# Claude Skills Registry
# Skills are auto-discovered by Claude from .claude/skills/
# This section serves as the framework's single source of truth
#
# User-created skills MUST include `custom: true` to be protected
# from overwrite during framework updates (mvt-update).
# ============================================================
skills:
  # --- Conductor Skills ---
  mvt-init:
    agent: conductor
    path: .claude/skills/mvt-init/SKILL.md
    template: skills/_templates/init-output.md
    category: project
    mode: independent

  mvt-status:
    agent: conductor
    path: .claude/skills/mvt-status/SKILL.md
    template: skills/_templates/status-output.md
    category: project
    mode: independent

  mvt-config:
    agent: conductor
    path: .claude/skills/mvt-config/SKILL.md
