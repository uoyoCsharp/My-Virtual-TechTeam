id: code-review
name: Code Review
description: Review existing code for quality, standards, and best practices

phases:
  - id: analyze
    name: Code Analysis
    agent: reviewer
    description: Analyze code structure and identify review areas
    inputs:
      - code_files
      - architecture_design
    outputs:
      - analysis_report
    next: review

  - id: review
    name: Detailed Review
    agent: reviewer
    description: Execute detailed code review
    inputs:
      - analysis_report
    outputs:
      - review_report
      - issue_list
    next: report

  - id: report
    name: Generate Report
    agent: reviewer
    description: Generate final review report with recommendations
    inputs:
      - review_report
    outputs:
      - final_report
    next: complete

config:
  confirm_phase_transition: false
  single_agent: true
  review_aspects:
    - architecture_compliance
    - code_quality
    - security
    - performance
    - maintainability

quick_commands:
  full_review:
    description: Run complete code review
    command: "#review"

  check_architecture:
    description: Check architecture compliance only
    command: "#check architecture"

  check_security:
    description: Check security concerns only
    command: "#check security"
