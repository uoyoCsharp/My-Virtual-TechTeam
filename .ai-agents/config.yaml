# AI Agent Framework - User Configuration
# This file contains user-configurable settings only.
# Resources (agents, skills, patterns) are discovered dynamically from their directories.

name: "AI Agent Workflow Framework"
version: "1.0"

# ============================================================
# System Settings
# ============================================================
system:
  default_agent: conductor
  language: en-US
  interaction_mode: semi-auto
  confirm_before_generate: true
  confirm_before_save: true

# ============================================================
# Output Settings
# ============================================================
output:
  no_emojis: true
  flow_charts:
    use_mermaid: true
  data_format: yaml
  max_description: 500

# ============================================================
# Pattern Settings
# ============================================================
pattern:
  # Active architecture pattern
  # Options: ddd, clean-architecture, frontend-react
  # Use "#init" to auto-detect or "#config" to change
  active: ddd

  selection:
    auto_detect: true
    confirm_with_user: true

# ============================================================
# Workspace Settings
# ============================================================
workspace:
  smart_loading:
    enabled: true
    default_level: minimal

  code_mapping:
    enabled: true
    auto_sync: true

# ============================================================
# Knowledge Settings
# ============================================================
knowledge:
  loading_order:
    - core/*
    - "patterns/{active}/*"
    - principle/*
    - project/*

  lazy_load:
    - "patterns/{inactive}/*"

# ============================================================
# Discovery Settings
# ============================================================
discovery:
  # Discovery mode: dynamic (scan on demand) | cached (use cache)
  mode: dynamic

# ============================================================
# Quick Path Presets
# ============================================================
quick_paths:
  minimal:
    load:
      - workspace/state/session.yaml
      - workspace/context/project.yaml
    analyze:
      - changed_files_only
    skip:
      - full_requirements
      - full_architecture
    max_tokens: 2000

  incremental:
    load:
      - workspace/state/session.yaml
      - workspace/context/project.yaml
      - workspace/context/architecture.yaml
    analyze:
      - related_modules
    skip:
      - full_requirements_analysis
    max_tokens: 5000

# ============================================================
# Smart Context Rules
# ============================================================
smart_context:
  rules:
    - trigger: "fix.*bug|modify.*feature"
      action: load_related_code
      context_level: minimal

    - trigger: "add.*feature|implement"
      action: load_architecture
      context_level: moderate

    - trigger: "refactor"
      action: load_full_context
      context_level: full

    - trigger: "architecture|design"
      action: load_design_context
      context_level: full

# ============================================================
# Directory Structure (Advanced)
# ============================================================
directories:
  agents: agents/
  skills: skills/
  workflows: workflows/
  knowledge: knowledge/
  workspace: workspace/
  workspace_state: workspace/state/
  workspace_context: workspace/context/
  workspace_history: workspace/history/
  workspace_artifacts: workspace/artifacts/
  workspace_requirements: workspace/requirements/
