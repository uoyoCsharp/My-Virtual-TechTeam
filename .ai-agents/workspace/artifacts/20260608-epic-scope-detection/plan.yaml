      - "Epic-hit y path routes to /mvt-decompose and does not write analysis.md"
      - "Epic-child scenario C reorder calls --switch-active (not --set-child-status active)"
      - "manifest.yaml conditional_suggestions and step references are updated"
      - "tsc clean; existing 155 tests pass"

  - id: "t5-advancement-trigger"
    title: "mvt-update-plan Step 5 Epic Advancement Check"
    status: pending
    completed_at: null
    depends_on: ["t1-data-foundation", "t2-epic-update-script"]
    project:
