tasks:
  - id: "t1-data-foundation"
    title: "session.yaml schema + session-update.js epic params + combo validation"
    status: in_progress
    completed_at: null
    depends_on: []
    project:
      - default
    skill_hint: mvt-implement
    artifacts:
      files:
        - "sources/defaults/session.yaml"
        - "sources/scripts/session-update.js"
    notes: >
      Module 1 (design.md). Add active_epic{id,title,created_at,epic_path}, epics[],
      and active_change.epic_id to session.yaml. Add 5 flat flags to session-update.js:
      --new-epic (+--epic-id), --set-epic-path, --set-epic-status, --close-epic, and
      extend --new-change with optional --epic-id. Mirror the existing --new-change /
      --change-id branch pattern in parseArgs/main(), including auto-snapshot of old
      active_epic into epics[]. Add the 4 combo-validation rules (§9.1.1, ADR-10) as a
      post-parseArgs step with non-zero exit. Backward compat: old session.yaml without
      epic fields reads as "no epic".
    acceptance:
      - "session.yaml has active_epic, epics[], and active_change.epic_id with documented defaults"
      - "--new-epic without --epic-id exits non-zero; --close-epic with --new-epic exits non-zero"
      - "--new-epic snapshots a prior non-empty active_epic into epics[]"
      - "--new-change --epic-id writes epic_id into active_change and the history entry"
      - "Old-format session.yaml (no epic fields) is handled without error"
      - "tsc clean; existing 155 tests pass"

  - id: "t2-epic-update-script"
    title: "epic-update.js deterministic state script + build wiring"
    status: pending
    completed_at: null
    depends_on: []
    project:
      - default
    skill_hint: mvt-implement
    artifacts:
      files:
        - "sources/scripts/epic-update.js"
        - "build-scripts.js"
        - "install-manifest.yaml"
    notes: >
      Module 2 (design.md, ADR-9). New standalone script mirroring plan-update.js
      structure/output protocol (single-line JSON on stdout exit 0, plain-text stderr
      exit 1, atomic temp+rename, node:fs + yaml). Ops: --complete-child (set done +
      completed_at, recompute current_change by FIRST ready pending child in array order
      = deterministic tie-break; all done/abandoned -> epic.status=done, current_change=""),
      --set-child-status, --switch-active (atomic demote-old + promote-target + repoint,
      validates target deps), --add-child (multi-flag), --validate (read-only). Validation
      rules: unique change_id, valid depends_on refs, DAG (no cycles), current_change points
      to pending/active, at-most-one active, status consistency. Add epic-update.js to
      build-scripts.js entryPoints and the epic-update.cjs pattern to install-manifest.yaml
      generated section.
    acceptance:
      - "epic-update.cjs --validate exits 0 on valid epic.yaml, 1 with error list on invalid"
      - "--complete-child advances current_change to first ready pending child by array order"
      - "--switch-active demotes old active to pending, promotes target, repoints current_change atomically"
      - "--switch-active rejects a target with unresolved depends_on (exit 1)"
      - "Cycle / dangling depends_on / multiple-active are rejected by validation"
      - "build-scripts.js emits dist/scripts/epic-update.cjs; install-manifest has the generated pattern"
      - "tsc clean; existing 155 tests pass"

  - id: "t3-decompose-skill"
    title: "mvt-decompose skill (manifest + business + template) + registry"
    status: pending
    completed_at: null
    depends_on: ["t1-data-foundation", "t2-epic-update-script"]
    project:
      - default
    skill_hint: mvt-implement
    artifacts:
      files:
        - "sources/skills/mvt-decompose/manifest.yaml"
        - "sources/skills/mvt-decompose/business.md"
        - "sources/templates/decompose-output/manifest.yaml"
        - "sources/templates/decompose-output/body.md"
        - "registry.yaml"
    notes: >
      Module 3 (design.md, §6). New skill: manifest modeled on mvt-analyze/manifest.yaml
      (role-header Strategist/analyst, shared activation/config/constraint sections,
      business.md, session-update, footer-next-steps). business.md = 7-step flow (load,
      lightweight sanity gate, epic analysis, decompose 2-8 children with DAG, write
      epic.md+epic.yaml LLM-self-validated + optional --validate, session-update --new-epic,
      output table+mermaid). Template is DIRECTORY-assembled (manifest.yaml + body.md,
      mirrors sources/templates/analyze-output/), NOT a flat .md; body.md has 6 sections
      (Vision, Scope & Out of Scope, Cross-cutting Concerns, Child Stories, Dependency Map,
      Open Questions). Register mvt-decompose (category: workflow) in registry.yaml via the
      reconcile-merge mechanism. epic-id format: epic-{YYYYMMDD}-{slug} (ADR-7).
    acceptance:
      - "manifest.yaml builds to .claude/skills/mvt-decompose/SKILL.md without error"
      - "decompose-output template builds to .ai-agents/skills/_templates/decompose-output.md via build:templates"
      - "registry.yaml lists mvt-decompose (category: workflow) and user custom skills are preserved"
      - "business.md generates epic-id with epic- prefix and writes epic.yaml + epic.md"
      - "tsc clean; existing 155 tests pass"

