    notes: >
      Module 4 (design.md, §7, ADR-3/11). Insert new integer Step 3 "Assess Scale
      (Epic Detection)" before existing Quick Path Detection; renumber old Steps 3-6 to
      4-7. Trigger = any strong signal OR (strong + 2 weak); branches y/n/show-signals,
      y routes to /mvt-decompose without writing analysis.md. Add epic-child mode
