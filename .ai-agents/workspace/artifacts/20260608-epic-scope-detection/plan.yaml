    notes: >
      Module 5 (design.md, ADR-12). Append new Step 5 "Epic Advancement Check" after
      existing Step 4. Read plan-update.cjs stdout: if plan_status == "done" AND
      active_change.epic_id non-empty -> prompt y/n/defer. y: epic-update.cjs
      --complete-child + session-update.cjs --close-change (close not archive), show next
      child. n: no advancement. defer: epic-update.cjs --set-child-status <id> done +
