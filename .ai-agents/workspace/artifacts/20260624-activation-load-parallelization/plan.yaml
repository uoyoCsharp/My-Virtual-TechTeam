        - sources/sections/activation-load-context.md
    notes: >
      ADR-1 + ADR-2. At the head of "## Activation Protocol" in activation-load-context.md add a "### Batch Load (do this first)" block instructing a SINGLE parallel read of the 3 base files
      (project-context.yaml, registry.yaml, config.yaml) with literal full paths, plus a "MUST NOT re-read" rule. Add an optional templated list via {{#activation_reads}} that appends extra files
      (each rendered with its literal path). Engine is unchanged — reuse existing section-loader block syntax. Verify rendering both with and without the param before done.
    acceptance:
      - Preamble appears before Stage 1 and lists the 3 base files with literal paths
      - Preamble includes an explicit MUST-NOT-re-read instruction for batched files
      - "{{#activation_reads}} block renders appended files when param present, renders nothing when absent"
      - A skill passing no activation_reads does NOT name session.yaml in its compiled preamble
