# Enables quick lookup of related content by topic, entity, or keyword
# Auto-updated by archive-manager on phase completion

version: "1.0"
last_updated: null

# Topic-based index
# Maps topics to relevant files and sections
by_topic: {}
  # Example:
  # "authentication":
  #   - file: "workspace/context/architecture.yaml"
  #     path: "decisions.auth"
  #     tokens: ~50
  #   - file: "workspace/artifacts/change-001/design.md"
  #     sections: ["Auth Module", "Token Strategy"]
  #     tokens: ~300
  #
  # "user-management":
  #   - file: "workspace/context/requirements.yaml"
  #     path: "features.user"
  #   - file: "workspace/context/architecture.yaml"
  #     path: "modules.user"

# Entity-based index
# Maps domain entities to their definitions and usages
by_entity: {}
  # Example:
  # "User":
  #   definition:
  #     file: "workspace/context/requirements.yaml"
  #     path: "entities.user"
  #   implementations:
  #     - file: "workspace/artifacts/change-001/design.md"
  #       path: "domain.user-aggregate"
  #   code_files:
  #     - "src/domain/User.ts"

# Keyword index
# Maps keywords to relevant content
by_keyword: {}
  # Example:
  # "JWT":
  #   - file: "workspace/context/architecture.yaml"
  #     path: "decisions.auth"
  #     snippet: "Use JWT tokens for stateless authentication"
  #
  # "bcrypt":
  #   - file: "workspace/artifacts/change-001/design.md"
  #     sections: ["Security Decisions"]

# Change History Index
# Maps change IDs to their artifacts
by_change: {}
  # Example:
  # "20260307-001-user-auth":
  #   title: "User Authentication"
  #   artifacts:
  #     - "workspace/artifacts/change-001/analysis.md"
  #     - "workspace/artifacts/change-001/design.md"
  #   topics: ["authentication", "user-management"]
  #   entities: ["User", "Email"]
  #   status: "completed"

# Statistics
stats:
  total_topics: 0
  total_entities: 0
  total_keywords: 0
  index_size_tokens: 0
